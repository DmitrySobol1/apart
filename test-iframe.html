<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget iframe test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f3f4f6; padding: 40px; }
    h1 { font-size: 1rem; color: #6b7280; margin-bottom: 16px; }
    iframe {
      display: block;
      width: 100%;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      transition: height 0.2s ease;
    }
  </style>
</head>
<body>
  <h1>Widget embed test — auto-height via postMessage</h1>
  <iframe
    id="widget"
    src="http://localhost:5173"
    title="Apart-NN Booking Widget"
  ></iframe>

  <script>
    var iframe = document.getElementById('widget');
    window.addEventListener('message', function (event) {
      if (!event.data) return;
      if (event.data.type === 'resize' && typeof event.data.height === 'number') {
        iframe.style.height = event.data.height + 'px';
      }
      if (event.data.type === 'scrollToWidget') {
        iframe.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  </script>
</body>
</html>
